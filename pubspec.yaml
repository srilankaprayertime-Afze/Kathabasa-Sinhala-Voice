name: kathabasa_sinhala_voice
description: "Kathabasa Sinhala Voice - Sri Lankan Sinhala Text-To-Speech Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  crypto: ^3.0.6
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  shared_preferences: ^2.3.4
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  fluttertoast: ^8.2.10
  video_player: ^2.9.3
  webview_flutter: ^4.10.0
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.0.0
  flutter_tts: ^4.2.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.3
  share_plus: ^12.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

